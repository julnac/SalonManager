version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: salon-manager-postgres
    environment:
      POSTGRES_DB: salon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - salon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salon-manager-backend
    environment:
      # Database configuration
      DATABASE_URL: jdbc:postgresql://postgres:5432/salon_db
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      # Spring profile
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    networks:
      - salon-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
    driver: local

networks:
  salon-network:
    driver: bridge
