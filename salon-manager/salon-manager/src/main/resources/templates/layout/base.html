<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">Salon Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/custom.css}">

    <th:block layout:fragment="head"></th:block>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <strong>Salon Manager</strong>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Strona główna</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/services}">Cennik</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/reviews}">Opinie</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('USER')">
                        <a class="nav-link" th:href="@{/client/dashboard}">Moje konto</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center">
                    <div sec:authorize="!isAuthenticated()">
                        <a class="btn btn-outline-primary me-2" th:href="@{/login}">Zaloguj się</a>
                        <a class="btn btn-primary" th:href="@{/register}">Zarejestruj się</a>
                    </div>

                    <div sec:authorize="isAuthenticated()" class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button"
                                id="userMenuDropdown" data-bs-toggle="dropdown">
                            <span sec:authentication="name">user@example.com</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" th:href="@{/client/dashboard}">Moje konto</a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="px-3 py-0">
                                    <button type="submit" class="dropdown-item">Wyloguj się</button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

        </div>
    </nav>

    <main class="py-4">
        <div layout:fragment="content">
        </div>
    </main>

    <footer class="bg-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2026 Salon Manager. Wszystkie prawa zastrzeżone.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/custom.js}"></script>

    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
