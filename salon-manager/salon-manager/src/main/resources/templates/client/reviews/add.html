<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Dodaj opinię</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="mb-4">
                        <h1>Dodaj swoją opinię</h1>
                        <p class="lead text-muted">Podziel się swoimi wrażeniami o naszych usługach</p>
                    </div>

                    <div class="booking-form">
                        <form th:action="@{/client/reviews/add}" th:object="${reviewForm}" method="post">

                            <div class="mb-3">
                                <label for="content" class="form-label">Twoja opinia *</label>
                                <textarea th:field="*{content}"
                                          id="content"
                                          class="form-control"
                                          rows="6"
                                          th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"
                                          placeholder="Opisz swoje wrażenia z wizyty w naszym salonie (min. 10 znaków)"></textarea>
                                <div th:if="${#fields.hasErrors('content')}"
                                     th:errors="*{content}"
                                     class="invalid-feedback">
                                </div>
                                <small class="form-text text-muted">Minimum 10 znaków, maksimum 1000 znaków</small>
                            </div>

                            <div th:if="${errorMessage}" class="alert alert-danger">
                                <span th:text="${errorMessage}">Error</span>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    Dodaj opinię
                                </button>
                                <a th:href="@{/reviews}" class="btn btn-outline-secondary">
                                    Anuluj
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
