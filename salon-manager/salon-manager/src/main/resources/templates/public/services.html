<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>Cennik usług</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="row mb-4">
                <div class="col">
                    <h1>Cennik usług</h1>
                    <p class="lead text-muted">Poznaj naszą ofertę i zarezerwuj swój termin</p>
                </div>
            </div>

            <div class="row">
                <div class="col-md-8 offset-md-2">

                    <div class="card mb-3 service-card" th:each="service : ${services}">
                        <div class="card-body">
                            <div class="row align-items-center">
                                <div class="col-md-6">
                                    <h4 class="card-title mb-2" th:text="${service.name}">Nazwa usługi</h4>
                                    <p class="text-muted mb-0">
                                        <small>Czas trwania: <span th:text="${service.durationMinutes} + ' min'">60 min</span></small>
                                    </p>
                                </div>
                                <div class="col-md-4 text-center">
                                    <p class="service-price mb-0" th:text="${#numbers.formatDecimal(service.price, 1, 2)} + ' PLN'">
                                        100.00 PLN
                                    </p>
                                </div>
                                <div class="col-md-2 text-end">
                                    <a sec:authorize="isAuthenticated()" class="btn btn-primary btn-sm">
                                        Rezerwuj
                                    </a>
                                    <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-outline-primary btn-sm">
                                        Zaloguj
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
