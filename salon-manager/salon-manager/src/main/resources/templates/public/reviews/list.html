<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>Opinie klientów</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="row mb-4">
                <div class="col">
                    <h1>Opinie naszych klientów</h1>
                    <p class="lead text-muted">Zobacz co mówią o nas nasi klienci</p>
                </div>
                <div class="col-auto" sec:authorize="isAuthenticated()">
                    <a th:href="@{/client/reviews/add}" class="btn btn-primary">
                        Dodaj opinię
                    </a>
                </div>
                <div class="col-auto" sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-primary">
                        Zaloguj się aby dodać opinię
                    </a>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div th:if="${#lists.isEmpty(reviews)}" class="alert alert-info">
                        <p class="mb-0">Brak opinii. Bądź pierwszy i podziel się swoją opinią!</p>
                    </div>

                    <div class="card mb-3" th:each="review : ${reviews}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-1">
                                    <span th:text="${review.userName}">Klient</span>
                                </h5>
                                <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'dd.MM.yyyy HH:mm')}">
                                    01.01.2025 12:00
                                </small>
                            </div>
                            <p class="card-text" th:text="${review.content}" style="white-space: pre-line;">
                                Treść opinii
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
