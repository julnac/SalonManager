<div class="dialog">
  <div class="dialog-icon" [class]="data.type || 'info'">
    <mat-icon>{{ icon() }}</mat-icon>
  </div>
  <h2 mat-dialog-title>{{ data.title }}</h2>
  <mat-dialog-content>
    <p>{{ data.message }}</p>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">{{ data.cancelText || 'Anuluj' }}</button>
    <button mat-flat-button [class]="'confirm-btn ' + (data.type || 'info')" (click)="confirm()">
      {{ data.confirmText || 'Potwierdź' }}
    </button>
  </mat-dialog-actions>
</div>
